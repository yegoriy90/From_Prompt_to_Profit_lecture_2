<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Models — Плюси та Мінуси 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 24px 16px; }
.container { max-width: 780px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #73726c; margin-bottom: 20px; }

.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filter-btn {
  padding: 4px 12px; border-radius: 20px; border: 1px solid #d3d1c7;
  background: transparent; color: #73726c; cursor: pointer; font-size: 12px;
  transition: all .15s; font-family: inherit;
}
.filter-btn.active {
  background: #fff; color: #1a1a18; border-color: #888780; font-weight: 500;
}
.filter-btn:hover:not(.active) { background: #eeecea; }

.grid { display: flex; flex-direction: column; gap: 10px; }
.card {
  border: 1px solid #d3d1c7; border-radius: 12px;
  background: #fff; overflow: hidden;
}
.card-header {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  cursor: pointer; user-select: none; transition: background .15s;
}
.card-header:hover { background: #fafaf8; }
.model-badge {
  font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
}
.badge-os  { background: #EAF3DE; color: #3B6D11; }
.badge-api { background: #E6F1FB; color: #185FA5; }
.badge-sub { background: #FAEEDA; color: #854F0B; }
.card-title { font-size: 14px; font-weight: 500; color: #1a1a18; flex: 1; }
.card-company { font-size: 12px; color: #73726c; }
.chevron { font-size: 10px; color: #888; transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }
.card-body { display: none; padding: 0 14px 14px; border-top: 1px solid #eeecea; }
.card-body.open { display: block; }
.use-tag {
  display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: #f5f4f0; border: 1px solid #d3d1c7;
  color: #5f5e5a; margin: 8px 4px 0 0;
}
.columns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
@media (max-width: 480px) { .columns { grid-template-columns: 1fr; } }
.col-head { font-size: 11px; font-weight: 500; margin-bottom: 6px; }
.col-plus .col-head { color: #3B6D11; }
.col-minus .col-head { color: #A32D2D; }
.item { display: flex; gap: 6px; font-size: 12px; color: #5f5e5a; margin-bottom: 5px; line-height: 1.4; }
.dot { flex-shrink: 0; margin-top: 5px; width: 6px; height: 6px; border-radius: 50%; }
.dot-plus  { background: #639922; }
.dot-minus { background: #E24B4A; }
.price-row { font-size: 12px; color: #73726c; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eeecea; }
.price-row span { color: #1a1a18; font-weight: 500; }
</style>
</head>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Всі</button>
    <button class="filter-btn" data-filter="os">Open Source</button>
    <button class="filter-btn" data-filter="api">API</button>
    <button class="filter-btn" data-filter="sub">Підписка</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

const typeMap = { "API": "api", "API + OS": "api", "Open Source": "os", "Підписка": "sub" };

function render(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  models.forEach((m, i) => {
    const t = typeMap[m.badge] || 'api';
    if (filter !== 'all' && t !== filter) return;
    const card = document.createElement('div');
    card.className = 'card';
    const badgeClass = t === 'os' ? 'badge-os' : t === 'sub' ? 'badge-sub' : 'badge-api';
    card.innerHTML = `
      <div class="card-header" onclick="toggle(${i})">
        <span class="model-badge ${badgeClass}">${m.badge}</span>
        <span class="card-title">${m.name}</span>
        <span class="card-company">${m.company}</span>
        <span class="chevron" id="chev-${i}">▼</span>
      </div>
      <div class="card-body" id="body-${i}">
        <div>${m.uses.map(u => `<span class="use-tag">${u}</span>`).join('')}</div>
        <div class="columns">
          <div class="col-plus">
            <div class="col-head">+ Переваги</div>
            ${m.plus.map(p => `<div class="item"><span class="dot dot-plus"></span><span>${p}</span></div>`).join('')}
          </div>
          <div class="col-minus">
            <div class="col-head">− Обмеження</div>
            ${m.minus.map(p => `<div class="item"><span class="dot dot-minus"></span><span>${p}</span></div>`).join('')}
          </div>
        </div>
        <div class="price-row">Ціна: <span>${m.price}</span></div>
      </div>`;
    grid.appendChild(card);
  });
}

function toggle(i) {
  const body = document.getElementById('body-'+i);
  const chev = document.getElementById('chev-'+i);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render('all');
</script>

</html>
