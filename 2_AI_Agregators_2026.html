<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Агрегатори — Повна Карта 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 24px 16px; }
.container { max-width: 780px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #73726c; margin-bottom: 20px; }

.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tab {
  padding: 5px 14px; border-radius: 20px; border: 1px solid #d3d1c7;
  background: transparent; color: #73726c; cursor: pointer; font-size: 12px;
  font-family: inherit; transition: all .15s;
}
.tab.active {
  background: #fff; color: #1a1a18;
  border-color: #888780; font-weight: 500;
}
.tab:hover:not(.active) { background: #eeecea; }

.section-label {
  font-size: 11px; font-weight: 500; color: #888780;
  text-transform: uppercase; letter-spacing: .05em; margin: 14px 0 8px;
}
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 520px) { .cards { grid-template-columns: 1fr; } }
.card {
  border: 1px solid #d3d1c7; border-radius: 12px;
  background: #fff; padding: 12px 14px; cursor: pointer;
  transition: border-color .15s;
}
.card:hover { border-color: #888780; }
.card.open { border-color: #888780; }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-icon {
  width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 15px; flex-shrink: 0;
  background: #f5f4f0; border: 1px solid #d3d1c7;
}
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 500; color: #1a1a18; }
.card-sub { font-size: 11px; color: #888780; margin-top: 1px; }
.badge-row { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.badge {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  border: 1px solid #d3d1c7; color: #5f5e5a;
}
.badge-new { background: #EAF3DE; border-color: #C0DD97; color: #3B6D11; }
.badge-acquired { background: #FAEEDA; border-color: #FAC775; color: #854F0B; }
.card-price {
  font-size: 11px; padding: 2px 7px; border-radius: 8px;
  border: 1px solid #d3d1c7; color: #5f5e5a;
  white-space: nowrap; flex-shrink: 0;
}
.card-body { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eeecea; }
.card-body.open { display: block; }
.models-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.model-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 8px;
  background: #f5f4f0; border: 1px solid #d3d1c7;
  color: #5f5e5a;
}
.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 480px) { .pros-cons { grid-template-columns: 1fr; } }
.pc-head { font-size: 10px; font-weight: 500; margin-bottom: 4px; }
.pc-plus .pc-head { color: #3B6D11; }
.pc-minus .pc-head { color: #A32D2D; }
.pc-item { display: flex; gap: 5px; font-size: 11px; color: #5f5e5a; margin-bottom: 3px; line-height: 1.35; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.dp { background: #639922; }
.dm { background: #E24B4A; }
.best-for { font-size: 11px; color: #5f5e5a; margin-top: 6px; }
.best-for span { color: #1a1a18; font-weight: 500; }
.note { font-size: 11px; color: #888780; margin-top: 5px; font-style: italic; }
</style>
</head>
<body>

function renderAll(cat) {
  const cont = document.getElementById('content');
  cont.innerHTML = '';
  data.forEach(section => {
    if (cat !== 'all' && section.cat !== cat) return;
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = section.label;
    cont.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'cards';
    section.items.forEach((item, idx) => {
      const id = section.cat + '-' + idx;
      const card = document.createElement('div');
      card.className = 'card';
      const badgesHtml = (item.badges || []).map(b => `<span class="badge ${b.cls}">${b.label}</span>`).join('');
      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon">${item.icon}</div>
          <div class="card-info">
            <div class="card-name">${item.name}</div>
            <div class="card-sub">${item.sub}</div>
            ${badgesHtml ? `<div class="badge-row">${badgesHtml}</div>` : ''}
          </div>
          <div class="card-price">${item.price}</div>
        </div>
        <div class="card-body" id="${id}">
          <div class="models-row">${item.models.map(m => `<span class="model-tag">${m}</span>`).join('')}</div>
          <div class="pros-cons">
            <div class="pc-plus">
              <div class="pc-head">+ Переваги</div>
              ${item.plus.map(p => `<div class="pc-item"><span class="dot dp"></span><span>${p}</span></div>`).join('')}
            </div>
            <div class="pc-minus">
              <div class="pc-head">− Мінуси</div>
              ${item.minus.map(m => `<div class="pc-item"><span class="dot dm"></span><span>${m}</span></div>`).join('')}
            </div>
          </div>
          <div class="best-for">Ідеально для: <span>${item.best}</span></div>
          ${item.note ? `<div class="note">${item.note}</div>` : ''}
        </div>`;
      card.querySelector('.card-top').addEventListener('click', () => {
        const body = document.getElementById(id);
        const isOpen = body.classList.toggle('open');
        card.classList.toggle('open', isOpen);
      });
      grid.appendChild(card);
    });
    cont.appendChild(grid);
  });
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderAll(tab.dataset.cat);
  });
});

renderAll('all');
</script>
